name: APK Batch Analysis

on:
  # 手动触发（方便测试）
  workflow_dispatch:

# 每周一 UTC 8:00

jobs:
  analyze:
    runs-on: windows-2025     # 显式指定，避免重定向警告

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # 强制使用 Node 24
      PYTHONIOENCODING: 'utf-8'   # 新增此行

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (for apktool.jar)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (if any)
        run: |
          python --version
          java -version

      - name: Run original batch analysis (main.py)
        run: python main.py
        shell: cmd

      - name: Run compatibility analysis (apk_compat_analysis.py)
        run: |
          for %%f in (apk\*.apk) do (
            echo Processing %%f
            python apk_compat_analysis.py "%%f"
          )
        shell: cmd

      - name: Upload analysis results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-analysis-reports
          path: |
            *.txt
            apk\*.txt
            apk\unpack\*\*.txt
          if-no-files-found: warn
